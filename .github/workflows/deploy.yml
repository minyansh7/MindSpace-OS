# Auto-deploy to Cloudflare Pages.
#
# - Push to `main`            → production deploy (canonical URL).
# - Push to any other branch  → preview deploy at a per-branch alias.
# - PR to `main`              → preview deploy + comment on the PR with the URL.
#
# One-time secret setup (do this once, then this file handles every deploy after):
#
#   1. Create a Cloudflare API token with the "Cloudflare Pages — Edit" template:
#        https://dash.cloudflare.com/profile/api-tokens
#      The template grants exactly: Account → Cloudflare Pages: Edit.
#
#   2. Add it as a GitHub repo secret named CLOUDFLARE_API_TOKEN:
#        https://github.com/minyansh7/mindspace-os-private/settings/secrets/actions
#
# After that, every push triggers a build → tests → deploy. No dashboard step needed.
#
# Account ID is hardcoded below (it's not a secret — it's in CF dashboard URLs and
# CLAUDE.md). If the account ever changes, edit `accountId` in the deploy step.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']
    paths:
      - 'site/**'
      - 'scripts/build_chart_figures.py'
      - 'data/canonical.json'
      - 'precomputed/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build_chart_figures.py'
      - 'data/canonical.json'
      - 'precomputed/**'
      - '.github/workflows/deploy.yml'

# Cancel in-flight runs for the same branch when a new push arrives — avoids
# wasted CI minutes when you push twice in a minute.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Astro 6 requires Node >= 22.12. Bun in CI spoofs an older Node version,
      # so install real Node 22 first; bun picks it up on PATH.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: site
        run: bun run build

      - name: Run tests
        working-directory: site
        run: bun test

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 985e6531724a5e9ce8670a37ead0d6f1
          command: pages deploy site/dist --project-name=mindspace-os --branch=${{ github.head_ref || github.ref_name }} --commit-hash=${{ github.sha }}
